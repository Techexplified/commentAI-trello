<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>

<body>

<script>
const ICON = 'https://cdn-icons-png.flaticon.com/512/2103/2103633.png';

window.TrelloPowerUp.initialize({

/* 1. BOARD BUTTON (Calculates Global Unread Count) */
'board-buttons': function(t) {
  return Promise.all([
    t.cards('id', 'badges'), // Gets all cards on the board
    t.get('board', 'private', 'seenCommentsMap', {}), // FIXED VISIBILITY
    t.get('board', 'private', 'showBoardUnread', true) // FIXED VISIBILITY
  ])
  .then(function([cards, seenMap, showBoardUnread]) {
    
    let btnText = 'Comment AI';
    let totalUnread = 0;

    // Calculate total unread across all cards
    if (showBoardUnread) {
        cards.forEach(card => {
            const total = (card.badges && card.badges.comments) ? card.badges.comments : 0;
            const seen = seenMap[card.id] || 0;
            if (total > seen) {
                totalUnread += (total - seen);
            }
        });
        
        if (totalUnread > 0) {
            btnText = `Comment AI (${totalUnread} Unread)`;
        }
    }

    return [{
      icon: ICON,
      text: btnText,
      callback: function(t) {
        return t.popup({
          title: 'Comment AI Settings',
          url: './settings.html',
          height: 480
        });
      }
    }];
  });
},

/* 2. CARD BADGES (Front of the Card) */
'card-badges': function(t, options) {
  return Promise.all([
    t.card('id', 'badges'),
    t.get('board', 'private', 'seenCommentsMap', {}), // FIXED VISIBILITY
    t.get('board', 'private', 'showCardUnread', true), // FIXED VISIBILITY
    t.get('board', 'private', 'showTotalBadge', false) // FIXED VISIBILITY
  ])
  .then(function([cardData, seenMap, showCardUnread, showTotalBadge]) {
    
    const badgesToReturn = [];
    const totalComments = (cardData.badges && cardData.badges.comments) ? cardData.badges.comments : 0;
    const seen = seenMap[cardData.id] || 0;
    const newComments = totalComments - seen;

    // 1. Unread Badge
    if (showCardUnread && newComments > 0) {
      badgesToReturn.push({
        text: `${newComments} Unread`,
        color: 'green' 
      });
    }

    // 2. Custom Total Comments Badge (If toggled on)
    if (showTotalBadge && totalComments > 0) {
      badgesToReturn.push({
        text: `Total: ${totalComments}`,
        color: 'light-gray'
      });
    }
    
    return badgesToReturn;
  });
},

// Dynamic trigger so badges re-render immediately
'dynamic-card-badges': function(t, options) {
    return this['card-badges'](t, options);
},

/* 3. CARD BUTTON (MENU TOGGLE) */
'card-buttons': function(t){
  return t.get('card','shared','commentAIEnabled', true)
  .then(function(enabled){
    return [{
      icon: ICON,
      text: enabled ? 'Remove Comment AI' : 'Add Comment AI',
      callback: function(t){
        return t.set('card','shared','commentAIEnabled', !enabled)
        .then(function(){
          return t.reload();
        });
      }
    }];
  });
},

/* 4. COMMENT AI SECTION & MARK AS READ LOGIC */
'card-back-section': function(t){

  // MARK AS READ: When card opens, update the board-level seen map
  Promise.all([
      t.card('id', 'badges'),
      t.get('board', 'private', 'seenCommentsMap', {}) // FIXED VISIBILITY
  ]).then(function([cardData, seenMap]) {
      const totalComments = (cardData.badges && cardData.badges.comments) ? cardData.badges.comments : 0;
      
      if (seenMap[cardData.id] !== totalComments) {
          seenMap[cardData.id] = totalComments;
          
          // Cleanup to save storage space (Remove tracking for 0 comments)
          Object.keys(seenMap).forEach(key => {
              if (seenMap[key] === 0) delete seenMap[key];
          });

          // Save the map back to Trello
          t.set('board', 'private', 'seenCommentsMap', seenMap); // FIXED VISIBILITY
      }
  });

  // Render the Section
  return t.get('card','shared','commentAIEnabled', true)
  .then(function(enabled){
    if(!enabled) return null;

    return {
      title: 'Comment AI',
      icon: ICON,
      content: {
        type: 'iframe',
        url: t.signUrl('./section.html'),
        height: 400
      },
      action: {
        text: 'Settings',
        callback: function(t) {
          return t.popup({
            title: 'Comment AI Settings',
            url: './settings.html',
            height: 480
          });
        }
      }
    };
  });
},

/* 5. SETTINGS MENU */
'show-settings': function(t) {
  return t.popup({
    title: 'Comment AI Settings',
    url: './settings.html',
    height: 480
  });
}

});
</script>

</body>
</html>
