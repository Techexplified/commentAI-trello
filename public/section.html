<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Base styles */
        body {
            background-color: transparent;
            color: #b6c2cf;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .ai-container {
            background: #1d2125;
            padding: 16px;
            border-radius: 8px;
        }

        /* Input Container (Figma Design) */
        .input-box {
            background-color: #22272b;
            border: 1px solid #38414a;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-box:focus-within {
            border-color: #579dff;
            box-shadow: 0 0 0 1px #579dff;
        }

        textarea {
            width: 100%;
            background: transparent;
            color: #eceff4;
            border: none;
            padding: 12px;
            font-size: 13px;
            resize: none;
            outline: none;
            min-height: 80px;
        }

        textarea::placeholder {
            color: #8c9bab;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid #38414a;
            background-color: #22272b;
        }

        /* Buttons */
        .toolbar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8c9bab;
            font-size: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .toolbar-btn:hover {
            color: #eceff4;
            background-color: #2c333a;
        }

        .primary-btn {
            background-color: #00c2e0; /* Trello/Figma teal color */
            color: #1d2125;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            padding: 6px 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .primary-btn:hover {
            opacity: 0.9;
        }

        .primary-btn:disabled {
            background-color: #38414a;
            color: #8c9bab;
            cursor: not-allowed;
        }

        /* Quick Action Pills */
        .quick-action-pill {
            background-color: #2c333a;
            border: 1px solid transparent;
            color: #b6c2cf;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-action-pill:hover {
            background-color: #38414a;
            border-color: #454f59;
            color: #eceff4;
        }

        /* Dropdowns */
        .dropdown-select {
            background-color: #2c333a;
            border: 1px solid #454f59;
            color: #eceff4;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 11px;
            outline: none;
            cursor: pointer;
            width: 100%;
        }

        .dropdown-select:focus {
            border-color: #579dff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #454f59; border-radius: 10px; }
    </style>
</head>

<body>
    <div class="ai-container" id="main-wrapper">
        
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <span class="text-[#00c2e0] text-lg">✦</span>
                <h3 class="font-semibold text-sm text-[#eceff4]">Comment AI</h3>
            </div>
            <button class="text-[#8c9bab] hover:text-white">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>
        <p class="text-xs text-[#8c9bab] mb-4">Get AI-powered insights and suggestions for your card</p>

        <div id="attachmentsSection" class="hidden mb-3">
            <p class="text-[11px] text-[#8c9bab] mb-2 font-semibold">Attached screenshots</p>
            <div id="fileList" class="space-y-2"></div>
        </div>

        <div class="input-box mb-4">
            <textarea id="userInput" placeholder="Type your question or paste a screenshot..."></textarea>
            
            <div class="input-footer">
                <div class="flex items-center gap-1">
                    <button id="attachBtn" class="toolbar-btn">
                        <span>📎 Attach</span>
                    </button>
                    <button id="screenshotBtn" class="toolbar-btn">
                        <span>🖼️ Screenshot</span>
                    </button>
                </div>
                
                <button id="generateBtn" class="primary-btn">
                    Ask Comment AI
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <select id="filterSelect" class="dropdown-select">
                <option value="">Format: Auto</option>
                <option value="brief">Brief & Concise</option>
                <option value="detailed">Highly Detailed</option>
                <option value="bullet points">Bullet Points</option>
                <option value="actionable steps">Actionable Steps</option>
            </select>
            
            <select id="templateSelect" class="dropdown-select">
                <option value="">Tone: Default</option>
                <option value="technical">Technical / Developer</option>
                <option value="professional">Professional / Client</option>
                <option value="constructive feedback">Constructive Feedback</option>
                <option value="urgent priority">Urgent / High Priority</option>
            </select>
        </div>

        <p class="text-[11px] text-[#8c9bab] font-semibold mb-2">Quick actions</p>
        <div class="flex flex-wrap gap-2 mb-4">
            <button id="suggestBtn" class="quick-action-pill">💡 Suggest improvements</button>
            <button id="subtasksBtn" class="quick-action-pill">📋 Break into subtasks</button>
            <button class="quick-action-pill">👥 Assign team members</button>
        </div>

        <div class="flex items-center justify-between mt-2 pt-2 border-t border-[#38414a]">
            <div class="flex items-center gap-2 text-[10px] text-[#00c2e0] font-bold uppercase tracking-wider">
                <span class="w-2 h-2 bg-[#00c2e0] rounded-full animate-pulse"></span>
                AI Ready
            </div>
            <span class="text-[10px] text-[#8c9bab]">Press Enter to send</span>
        </div>

        <div id="processingScreen" class="hidden mt-4">
            <div class="bg-[#22272b] border border-[#38414a] rounded-lg p-4">
                <div class="flex justify-center mb-3">
                    <div class="flex gap-2">
                        <div class="w-2 h-2 bg-[#00c2e0] rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-[#00c2e0] rounded-full animate-bounce delay-75"></div>
                        <div class="w-2 h-2 bg-[#00c2e0] rounded-full animate-bounce delay-150"></div>
                    </div>
                </div>
                <p class="text-center text-sm text-[#eceff4] font-semibold">Structuring your comment...</p>
                <p class="text-center text-xs text-[#8c9bab] mb-4">This usually takes 5-10 seconds</p>
                
                <div class="bg-[#1d2125] rounded p-3 text-xs text-[#8c9bab] space-y-1">
                    <p class="flex items-center gap-2"><span>👁️</span> Analyzing your context</p>
                    <p id="processingScreenshots" class="flex items-center gap-2 pl-4 text-[#00c2e0]"></p>
                    <p id="processingChars" class="flex items-center gap-2 pl-4 text-[#00c2e0]"></p>
                    <p class="flex items-center gap-2"><span>✨</span> Generating actionable insights</p>
                </div>
            </div>
        </div>

        <div id="outputSection" class="hidden mt-6 pt-4 border-t border-[#38414a]">
            <div class="flex justify-between items-center mb-2">
                <label class="text-[10px] font-bold text-[#8c9bab] uppercase">AI-Generated Result</label>
                <button id="copyBtn" class="text-[#579dff] text-[10px] hover:underline">Copy text</button>
            </div>
            <textarea id="aiOutput" class="bg-[#22272b] p-4 rounded border border-[#38414a] text-sm text-[#eceff4] w-full resize-y min-h-[150px] mb-2"></textarea>

            <button id="insertBtn" class="w-full mb-2 bg-[#579dff] hover:bg-[#85b8ff] text-[#1d2125] text-xs py-2 rounded font-semibold transition-colors">
                Insert as Comment
            </button>
            <button id="insertDescBtn" class="w-full bg-[#2c333a] hover:bg-[#38414a] text-[#eceff4] text-xs py-2 rounded font-semibold border border-[#454f59] transition-colors">
                Insert as Description
            </button>
        </div>
    </div>

    <script type="module" src="./section.js"></script>
</body>

</html>
