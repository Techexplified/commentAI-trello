<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-wrapper" class="ai-card">
        <div class="header">
            <div class="brand">
                <span class="sparkle">✦</span>
                <h3>Comment AI</h3>
            </div>
            <button class="info-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </button>
        </div>

        <p class="subtitle">Get AI-powered insights and suggestions for your card</p>

        <div class="input-container">
            <textarea id="userInput" rows="4" placeholder="Type your question or paste a screenshot..."></textarea>
            
            <div class="input-footer">
                <button id="attachBtn" class="text-link">📎 Attach Screenshot</button>
                <button id="generateBtn" class="primary-btn">
                    Ask Comment AI 
                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="button-group">
            <button id="suggestBtn" class="secondary-btn">💡 Suggest improvements</button>
            <button id="subtasksBtn" class="secondary-btn">📋 Break into subtasks</button>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <span class="dot"></span>
                AI READY
            </div>
            <span class="hint">Press Enter to send</span>
        </div>

        <div id="outputSection" class="output-section hidden">
            <div class="output-header">
                <label>AI-GENERATED RESULT</label>
                <button id="copyBtn">Copy text</button>
            </div>
            <textarea id="aiOutput"></textarea>
            <button id="insertBtn" class="action-btn">Insert as Comment</button>
            <button id="insertDescBtn" class="action-btn">Insert as Description</button>
        </div>
    </div>
    <script type="module" src="./section.js"></script>
</body>
</html>
