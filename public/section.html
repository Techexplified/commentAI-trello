<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Match Trello's Dark Theme Colors */
        body {
            background-color: transparent;
            color: #b6c2cf;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .ai-container {
            background: #1d2125;
            padding: 16px;
            border: 1px solid #38414a;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .input-wrapper {
            background: #22272b;
            border: 1px solid #454f59;
            border-radius: 6px;
            transition: all 0.2s;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: #579dff;
            box-shadow: 0 0 0 1px #579dff;
        }

        textarea {
            background: transparent !important;
            color: #eceff4 !important;
            border: none !important;
            resize: none;
            outline: none !important;
            box-shadow: none !important;
        }

        .quick-action-btn {
            background: #2c333a;
            border: 1px solid #454f59;
            color: #b6c2cf;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .quick-action-btn:hover {
            background: #38414a;
        }

        .primary-btn {
            background: #579dff;
            color: #1d2125;
            font-weight: 600;
            transition: background 0.2s;
        }

        .primary-btn:hover {
            background: #85b8ff;
        }

        .primary-btn:disabled {
            background: #38414a;
            color: #8c9bab;
            cursor: not-allowed;
        }

        /* Custom scrollbar for output */
        #aiOutput::-webkit-scrollbar {
            width: 6px;
        }

        #aiOutput::-webkit-scrollbar-track {
            background: #1d2125;
        }

        #aiOutput::-webkit-scrollbar-thumb {
            background: #454f59;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="ai-container p-4" id="main-wrapper">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <span class="text-[#579dff] text-xl">✦</span>
                <h3 class="font-semibold text-sm text-[#eceff4]">Comment AI</h3>
            </div>
            <button class="text-[#8c9bab] hover:text-white">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </button>
        </div>

        <p class="text-xs text-[#8c9bab] mb-3">Get AI-powered insights and suggestions for your card</p>

        <div id="attachmentsSection" class="hidden mt-3 mb-3">
            <p class="text-[11px] text-[#8c9bab] mb-2">Attached screenshots</p>
            <div id="fileList" class="space-y-2"></div>
        </div>

        <div class="input-wrapper mb-4">
            <textarea id="userInput" rows="3" class="w-full p-3 text-sm"
                placeholder="Type your question or paste a screenshot..."></textarea>

            <div class="flex items-center justify-between p-2 bg-[#1d2125] border-t border-[#38414a]">
                <button id="attachBtn" class="flex items-center gap-1 text-xs text-[#8c9bab] hover:text-white px-2 py-1 rounded hover:bg-[#2c333a] transition-colors">
                    <span>📎 Attach</span>
                </button>
                <button id="generateBtn" class="primary-btn px-3 py-1.5 rounded text-xs flex items-center gap-2">
                    <span>Ask Comment AI</span>
                    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex gap-2 mb-4 w-full">
            <select id="filterSelect" class="bg-[#2c333a] border border-[#454f59] text-[#eceff4] text-xs px-2 py-2 rounded focus:border-[#579dff] focus:outline-none flex-1 cursor-pointer">
                <option value="">Output Length: Auto</option>
                <option value="brief">Brief & Concise</option>
                <option value="detailed">Highly Detailed</option>
                <option value="bullet points">Bullet Points</option>
                <option value="actionable steps">Actionable Steps</option>
            </select>
            
            <select id="templateSelect" class="bg-[#2c333a] border border-[#454f59] text-[#eceff4] text-xs px-2 py-2 rounded focus:border-[#579dff] focus:outline-none flex-1 cursor-pointer">
                <option value="">Tone: Default</option>
                <option value="technical">Technical / Developer</option>
                <option value="professional">Professional / Client-facing</option>
                <option value="constructive feedback">Constructive Feedback</option>
                <option value="urgent priority">Urgent / High Priority</option>
            </select>
        </div>

        <div class="flex flex-wrap gap-2 mb-2">
            <button id="suggestBtn" class="quick-action-btn">💡 Suggest improvements</button>
            <button id="subtasksBtn" class="quick-action-btn">📋 Break into subtasks</button>
        </div>

        <div class="flex items-center justify-between mt-4">
            <div class="flex items-center gap-2 text-[10px] text-green-500 font-bold uppercase tracking-wider">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                AI Ready
            </div>
            <span class="text-[10px] text-[#8c9bab]">Press Enter to send</span>
        </div>

        <div id="processingScreen" class="hidden mt-6">
            <div class="bg-[#22272b] border border-[#38414a] rounded-lg p-4">
                <div class="flex justify-center mb-3">
                    <div class="flex gap-2">
                        <div class="w-2 h-2 bg-teal-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-teal-400 rounded-full animate-bounce delay-75"></div>
                        <div class="w-2 h-2 bg-teal-400 rounded-full animate-bounce delay-150"></div>
                    </div>
                </div>
                <p class="text-center text-sm text-[#b6c2cf] font-semibold">
                    Structuring your comment...
                </p>
                <p class="text-center text-xs text-[#8c9bab] mb-4">
                    This usually takes 30-60 seconds
                </p>
                <div class="bg-[#1d2125] border border-[#38414a] rounded p-3 text-xs">
                    <p class="mb-1">Analyzing your context</p>
                    <p id="processingScreenshots"></p>
                    <p id="processingChars"></p>
                    <p>Generating actionable insights</p>
                </div>
            </div>
        </div>

        <div id="outputSection" class="hidden mt-6 pt-4 border-t border-[#38414a]">
            <div class="flex justify-between items-center mb-2">
                <label class="text-[10px] font-bold text-[#8c9bab] uppercase">AI-Generated Result</label>
                <button id="copyBtn" class="text-blue-400 text-[10px] hover:underline">Copy text</button>
            </div>
            <textarea id="aiOutput"
                class="bg-[#22272b] p-4 rounded border border-[#38414a] text-sm text-[#eceff4] w-full resize-y min-h-[200px] max-h-[400px]"></textarea>

            <button id="insertBtn"
                class="w-full mt-3 bg-[#2c333a] hover:bg-[#38414a] text-[#eceff4] text-xs py-2 rounded font-semibold border border-[#454f59]">
                Insert as Comment
            </button>

            <button id="insertDescBtn" class="w-full mt-2 bg-[#2c333a] hover:bg-[#38414a] text-[#eceff4] text-xs py-2 rounded font-semibold border border-[#454f59]">
                Insert as Description
            </button>
        </div>
    </div>

    <script type="module" src="./section.js"></script>
</body>

</html>
