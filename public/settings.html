<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Light Theme (Default) */
        :root { 
            --bg-color: #ffffff; 
            --text-color: #172b4d; 
            --input-bg: #f4f5f7; 
            --input-border: #dfe1e6;
            --subtext: #5e6c84; 
            --link-color: #0052cc; 
            --focus-ring: rgba(0, 82, 204, 0.4);
        }

        /* Dark Theme */
        body.trello-theme-dark { 
            --bg-color: #1d2125; 
            --text-color: #b6c2cf; 
            --input-bg: #22272b; 
            --input-border: #38414a;
            --subtext: #8c9bab; 
            --link-color: #579dff; 
            --focus-ring: rgba(87, 157, 255, 0.4);
        }

        /* Base Styles */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 16px; 
            overflow: hidden; 
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Form Elements */
        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
            letter-spacing: 0.025em;
        }

        .form-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: inherit;
            border-radius: 4px;
            padding: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .form-input:focus {
            box-shadow: 0 0 0 2px var(--focus-ring);
            border-color: transparent;
        }

        /* Info Box */
        .info-box { 
            margin-top: 12px;
            padding: 12px;
            background-color: rgba(87, 157, 255, 0.1); 
            border: 1px solid rgba(87, 157, 255, 0.2); 
            border-radius: 4px;
        }

        .info-text {
            font-size: 11px;
            line-height: 1.625;
            color: var(--subtext);
            margin: 0;
        }

        .info-link {
            font-weight: 700;
            color: var(--link-color);
            text-decoration: none;
        }

        .info-link:hover {
            text-decoration: underline;
        }

        /* Button */
        .btn-primary {
            width: 100%;
            background-color: #579dff;
            color: #1d2125;
            font-weight: 700;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary:hover {
            background-color: #0052cc;
            color: #ffffff;
        }
    </style>
</head>
<body id="settings-container">
    <div class="container">
        <div>
            <label class="form-label">Gemini API Configuration</label>
            <input type="password" id="apiKey" class="form-input" placeholder="Enter your Gemini API Key">
            
            <div class="info-box">
                <p class="info-text">
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="info-link">
                       Get your Free Gemini API Key here →
                    </a>
                </p>
            </div>
        </div>
        
        <button id="saveBtn" class="btn-primary">
            Save Changes
        </button>
    </div>

    <script>
        const t = window.TrelloPowerUp.iframe();
        const input = document.getElementById('apiKey');

        t.render(() => {
            const context = t.getContext();
            // Automatically switches variables based on Trello's current theme
            document.body.classList.toggle('trello-theme-dark', context.theme === 'dark');
            t.sizeTo('#settings-container').done();
        });

        // Load existing API key
        t.get('member', 'private', 'apiKey').then(val => { 
            if(val) input.value = val; 
        });

        // Save API key
        document.getElementById('saveBtn').onclick = () => {
            t.set('member', 'private', 'apiKey', input.value.trim())
            .then(() => t.closePopup());
        };
    </script>
</body>
</html>
